# apps.conf — all apps on port 443, path-based routing
# /alexa  → alexa-gdrive (Flask/Gunicorn on pi5:5000)
# /health → health-os (Next.js on pi5:3000)
# Shared cert at /etc/ssl/myweb/ (managed by nginx-proxy/setup.sh)

server {
    listen 443 ssl;
    server_name myweb.tail075174.ts.net;

    ssl_certificate     /etc/ssl/myweb/cert.pem;
    ssl_certificate_key /etc/ssl/myweb/key.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── alexa-gdrive ──────────────────────────────────────────────────────────
    # Alexa POST endpoint — update skill URL in Alexa Developer Console to:
    #   https://myweb.tail075174.ts.net/alexa/
    location /alexa/ {
        proxy_pass         http://192.168.40.99:5000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
    }

    # ── health-os ─────────────────────────────────────────────────────────────
    location /health/ {
        proxy_pass         http://192.168.40.99:3000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # Next.js static assets — served from /_next/ (no path prefix in app)
    location /_next/ {
        proxy_pass         http://192.168.40.99:3000/_next/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
