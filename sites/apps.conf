# apps.conf — path-based routing
# /        → myweb landing dashboard (Next.js on pi5:3008)
# /alexa   → alexa-gdrive (Flask/Gunicorn on pi5:5000)
# /health  → health-os (Next.js on pi5:3000)
# /brief   → morning-brief (Node.js on pi5:3002)
# /noc     → noc-dashboard (Next.js on pi5:3003)
# /lifeops → lifeops dashboard (Next.js on pi5:3005)
# /argus   → argus camera monitor (Next.js on pi5:3006)
# /lumina  → lumina inspiration manager (Next.js on pi5:3009)
# /ytdl    → YouTube playlist to MP3 converter (Next.js on pi5:3007)
# /backup  → backup dashboard (myweb/Next.js on pi5:3008)
# /kuma    → Uptime Kuma (Docker on pi4:3001) — iframe proxy
#
# Three listeners:
#   192.168.40.100:80   — HTTP redirect to Tailscale HTTPS hostname
#   192.168.40.100:443  — LAN access (TLS, Tailscale cert)
#   127.0.0.1:8080      — Tailscale Funnel (Funnel terminates TLS, passes plain HTTP)
#
# Shared cert at /etc/ssl/myweb/ (managed by nginx-proxy/setup.sh)

# HTTP → HTTPS redirect
server {
    listen 192.168.40.100:80;
    server_name _;
    return 301 https://myweb.tail075174.ts.net$request_uri;
}

server {
    listen 192.168.40.100:443 ssl;
    listen 127.0.0.1:8080;
    server_name myweb.tail075174.ts.net;

    ssl_certificate     /etc/ssl/myweb/cert.pem;
    ssl_certificate_key /etc/ssl/myweb/key.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 200m;

    # ── myweb — root landing dashboard ───────────────────────────────────────
    location = / {
        proxy_pass         http://192.168.40.99:3004;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    location /admin {
        proxy_pass         http://192.168.40.99:3004;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # ── alexa-gdrive ──────────────────────────────────────────────────────────
    # Alexa skill POST endpoint — Amazon POSTs here, no redirects followed
    # Skill URL in Alexa Developer Console: https://myweb.tail075174.ts.net/alexa
    # Non-POST requests (browser navigation) are redirected to the web UI at /alexa/
    location = /alexa {
        if ($request_method !~ ^POST$) {
            return 301 $scheme://$http_host/alexa/;
        }
        proxy_pass         http://192.168.40.99:5000/alexa;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
    }

    # Web UI
    location /alexa/ {
        proxy_pass         http://192.168.40.99:5000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
    }

    # Alexa static assets (JS calls these with absolute paths)
    location /static/ {
        proxy_pass         http://192.168.40.99:5000/static/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── NAS ──────────────────────────────────────────────────────────────────────
    # API must come first — /nas/api/ would otherwise match the /nas block
    location /nas/api/ {
        auth_basic         "NAS Admin";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass         http://192.168.40.99:5001/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
    }

    location /nas {
        auth_basic         "NAS Admin";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass         http://192.168.40.99:5001/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── health-os ─────────────────────────────────────────────────────────────
    location = /health { return 301 https://$host/health/dashboard; }

    # No trailing slash on proxy_pass — preserves /health prefix so Next.js
    # basePath: '/health' can handle routes correctly
    location /health {
        proxy_pass         http://192.168.40.99:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_hide_header  Cache-Control;
        add_header         Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Health-os API routes — Next.js fetch() uses absolute paths; basePath means
    # the actual routes live at /health/api/ on Next.js, so we rewrite here.
    # These must come BEFORE the alexa /api/ catch-all below.
    location /api/records    { proxy_pass http://192.168.40.99:3000/health/api/records;    proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /api/events     { proxy_pass http://192.168.40.99:3000/health/api/events;     proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /api/settings   { proxy_pass http://192.168.40.99:3000/health/api/settings;   proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /api/health/    { proxy_pass http://192.168.40.99:3000/health/api/health/;    proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /api/nutrition/ { proxy_pass http://192.168.40.99:3000/health/api/nutrition/; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /api/fitness/   { proxy_pass http://192.168.40.99:3000/health/api/fitness/;   proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /api/supplements { proxy_pass http://192.168.40.99:3000/health/api/supplements; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /api/recovery/   { proxy_pass http://192.168.40.99:3000/health/api/recovery/;   proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /api/weight      { proxy_pass http://192.168.40.99:3000/health/api/weight;      proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /api/mcp/        { proxy_pass http://192.168.40.99:3000/health/api/mcp/;        proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }

    location /manifest.json {
        proxy_pass         http://192.168.40.99:3000/manifest.json;
        proxy_set_header   Host              $host;
    }

    # myweb API routes — must come BEFORE the /api/ catch-all below
    location /api/status  { proxy_pass http://192.168.40.99:3004/api/status;  proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /api/config  { proxy_pass http://192.168.40.99:3004/api/config;  proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /api/backup/ { proxy_pass http://192.168.40.99:3004/api/backup/; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    # backup-dashboard API — must come before /api/ catch-all
    location /api/backups/ { proxy_pass http://192.168.40.99:3008/backup/api/backups/; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }

    # Alexa API catch-all — all remaining /api/ routes go to Flask
    location /api/ {
        proxy_pass         http://192.168.40.99:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── morning-brief ─────────────────────────────────────────────────────────
    location = /brief { return 301 https://$host/brief/; }

    location /brief/ {
        proxy_pass         http://192.168.40.99:3002/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
    }

    # ── lifeops ───────────────────────────────────────────────────────────────
    # SSE block must come BEFORE the general /lifeops block (longest-prefix wins)
    location /lifeops/api/journal/summary {
        proxy_pass         http://192.168.40.99:3005;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
    }

    location /lifeops {
        proxy_pass         http://192.168.40.99:3005;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # ── ytdl — YouTube playlist to MP3 converter ─────────────────────────────
    # SSE progress endpoint — must come BEFORE general /ytdl block
    location /ytdl/api/progress/ {
        proxy_pass         http://192.168.40.99:3007;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }

    location /ytdl {
        proxy_pass         http://192.168.40.99:3007;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        # Large MP3/ZIP downloads
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering    off;
    }

    # ── lumina — inspiration manager ─────────────────────────────────────────
    location /lumina {
        proxy_pass         http://192.168.40.99:3009;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # ── argus — camera monitor ────────────────────────────────────────────────
    location /argus {
        proxy_pass         http://192.168.40.99:3006;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # ── noc-dashboard ─────────────────────────────────────────────────────────
    # No trailing-slash redirect — Next.js strips trailing slashes (308),
    # which would create a loop. Let /noc and /noc/... both flow through.
    location /noc {
        proxy_pass         http://192.168.40.99:3003;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # ── backup-dashboard (Next.js on pi5:3008) ───────────────────────────────
    location /backup {
        proxy_pass         http://192.168.40.99:3008;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # Uptime Kuma proxy — avoids mixed HTTP/HTTPS when embedded as iframe
    location /kuma/ {
        proxy_pass         http://192.168.40.97:3001/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # ── alwayson — web terminal gateway ──────────────────────────────────────
    # Auth check sub-request (internal — called by auth_request below)
    location = /alwayson/auth-check {
        internal;
        proxy_pass         http://192.168.40.99:4000/alwayson/auth-check;
        proxy_pass_request_body off;
        proxy_set_header   Content-Length "";
        proxy_set_header   X-Original-URI $request_uri;
        proxy_set_header   Cookie $http_cookie;
    }

    # Named location for unauthenticated terminal redirect
    location @alwayson_login {
        return 302 /alwayson/login;
    }

    # Auth app — login page, OTP, landing, logout (no auth required)
    location /alwayson {
        proxy_pass         http://192.168.40.99:4000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # Terminal: Pi5 — auth-gated, WebSocket (ttyd runs locally on .100)
    location /alwayson/terminal/pi5/ {
        auth_request      /alwayson/auth-check;
        error_page 401  = @alwayson_login;
        proxy_pass         http://127.0.0.1:7681/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # Terminal: Pi4 — auth-gated, WebSocket (ttyd runs locally on .100)
    location /alwayson/terminal/pi4/ {
        auth_request      /alwayson/auth-check;
        error_page 401  = @alwayson_login;
        proxy_pass         http://127.0.0.1:7682/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # Terminal: Mac — auth-gated, WebSocket (ttyd runs locally on .100)
    # NOTE: update ttyd-mac.service IP when Mac gets static .98
    location /alwayson/terminal/mac/ {
        auth_request      /alwayson/auth-check;
        error_page 401  = @alwayson_login;
        proxy_pass         http://127.0.0.1:7683/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # Next.js static assets — myweb owns /_next/ since it's at root
    # Other apps (health, noc) use basePath so their assets flow through
    # their own location blocks (e.g. /health/_next/, /noc/_next/)
    location /_next/ {
        proxy_pass         http://192.168.40.99:3004/_next/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
