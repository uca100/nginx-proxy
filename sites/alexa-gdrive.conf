# alexa-gdrive — LAN access on port 443
# Internet access handled by Tailscale Funnel → :5000 directly
# Proxies to Flask/Gunicorn on :5000
# App stays on pi5 (192.168.40.99) — nginx proxies across the LAN
# Shared cert at /etc/ssl/myweb/ (managed by nginx-proxy/setup.sh)

server {
    listen 192.168.40.100:443 ssl;
    server_name myweb.tail075174.ts.net;

    ssl_certificate     /etc/ssl/myweb/cert.pem;
    ssl_certificate_key /etc/ssl/myweb/key.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Alexa requires responses within 8s — give gunicorn some headroom
    proxy_read_timeout  10s;
    proxy_send_timeout  10s;

    location / {
        proxy_pass         http://192.168.40.99:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
