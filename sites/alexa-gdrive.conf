# alexa-gdrive — LAN access on port 443
# Internet access handled by Tailscale Funnel → :5000 directly
# Proxies to Flask/Gunicorn on :5000
# Shared cert at /etc/ssl/pi5/ (managed by nginx-proxy/setup.sh)

server {
    listen 192.168.40.99:443 ssl;
    server_name pi5.tail075174.ts.net;

    ssl_certificate     /etc/ssl/pi5/cert.pem;
    ssl_certificate_key /etc/ssl/pi5/key.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Alexa requires responses within 8s — give gunicorn some headroom
    proxy_read_timeout  10s;
    proxy_send_timeout  10s;

    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
