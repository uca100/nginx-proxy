# health-os — LAN access on port 8443
# Internet access handled by Tailscale Funnel → :3000 directly
# Proxies to Next.js on :3000
# App stays on pi5 (192.168.40.99) — nginx proxies across the LAN
# Shared cert at /etc/ssl/myweb/ (managed by nginx-proxy/setup.sh)

server {
    listen 192.168.40.100:8443 ssl;
    server_name myweb.tail075174.ts.net;

    ssl_certificate     /etc/ssl/myweb/cert.pem;
    ssl_certificate_key /etc/ssl/myweb/key.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://192.168.40.99:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Next.js WebSocket support (hot reload / dev mode)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
