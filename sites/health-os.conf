# health-os — LAN access on port 8443
# Internet access handled by Tailscale Funnel → :3000 directly
# Proxies to Next.js on :3000
# Shared cert at /etc/ssl/pi5/ (managed by nginx-proxy/setup.sh)

server {
    listen 192.168.40.99:8443 ssl;
    server_name pi5.tail075174.ts.net;

    ssl_certificate     /etc/ssl/pi5/cert.pem;
    ssl_certificate_key /etc/ssl/pi5/key.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Next.js WebSocket support (hot reload / dev mode)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
